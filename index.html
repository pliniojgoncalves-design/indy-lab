<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indy Lab v2.4 - Engineering Suite</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; height: 100vh; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .insert-line { position: relative; height: 12px; transition: all 0.2s; }
        .insert-line:hover { height: 35px; }
        .insert-line button { opacity: 0; transition: opacity 0.2s; }
        .insert-line:hover button { opacity: 1; }
        .correct-indicator { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6) !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;

        // --- ICONOGRAFIA ---
        const Icons = {
            Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Map: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>,
            Code: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>,
            Up: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,
            Down: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            Check: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Image: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        };

        function App() {
            const [view, setView] = useState('builder'); 
            const [mission, setMission] = useState({
                title: '',
                id: '',
                category: 'normal',
                img: 'normal-cockpit', // Imagem Global
                defaultRole: 'PF', // Role Global
                items: []
            });
            const [mappingStep, setMappingStep] = useState(0);
            const [manualImg, setManualImg] = useState(null);
            const [showJson, setShowJson] = useState(false);
            const canvasRef = useRef(null);

            // --- LÓGICA DE GESTÃO DE ETAPAS ---
            const createBaseItem = () => ({
                id: `it_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                label: '',
                status: '',
                type: 'click', 
                role: mission.defaultRole,
                specificImg: '', 
                coords: null,
                prompt: '',
                choices: ['', '', ''],
                correct: 0
            });

            const addStep = () => {
                setMission(prev => ({ ...prev, items: [...prev.items, createBaseItem()] }));
            };

            const insertStepAt = (index) => {
                const newItems = [...mission.items];
                newItems.splice(index, 0, createBaseItem());
                setMission({ ...mission, items: newItems });
            };

            const moveStep = (index, direction) => {
                const newItems = [...mission.items];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newItems.length) return;
                [newItems[index], newItems[targetIndex]] = [newItems[targetIndex], newItems[index]];
                setMission({ ...mission, items: newItems });
            };

            const updateItem = (idx, field, val) => {
                const up = [...mission.items];
                up[idx][field] = val;
                setMission({ ...mission, items: up });
            };

            const updateChoice = (idx, choiceIdx, val) => {
                const up = [...mission.items];
                up[idx].choices[choiceIdx] = val;
                setMission({ ...mission, items: up });
            };

            // --- LÓGICA DO MAPEADOR ---
            const currentImage = useMemo(() => {
                const currentItem = mission.items[mappingStep];
                if (!currentItem) return mission.img;
                return currentItem.specificImg || mission.img;
            }, [mission, mappingStep]);

            const handleMapClick = (e) => {
                if (!canvasRef.current || !mission.items[mappingStep]) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(1));
                const y = parseFloat((((e.clientY - rect.top) / rect.height) * 100).toFixed(1));

                const up = [...mission.items];
                if (up[mappingStep].type === 'click') {
                    up[mappingStep].coords = { x, y };
                    setMission({ ...mission, items: up });
                    if (mappingStep < up.length - 1) setMappingStep(mappingStep + 1);
                } else {
                    if (mappingStep < up.length - 1) setMappingStep(mappingStep + 1);
                }
            };

            const copyJson = () => {
                const data = JSON.stringify(mission, null, 2);
                const el = document.createElement('textarea');
                el.style.position = 'fixed';
                el.style.opacity = '0';
                el.value = data;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("JSON Copiado! Envie-o para o chat do desenvolvedor.");
            };

            return (
                <div className="h-screen w-full flex flex-col bg-[#020617] text-slate-200 font-sans overflow-hidden italic leading-none">
                    
                    <header className="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-slate-900/80 backdrop-blur-xl shrink-0 z-50">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-500/20 p-2 rounded-xl text-blue-400"><Icons.Code /></div>
                            <div>
                                <h1 className="text-sm font-black uppercase tracking-widest text-white leading-none italic">Indy Lab <span className="text-blue-500">v2.4</span></h1>
                                <p className="text-[9px] text-slate-500 font-bold uppercase mt-1 italic tracking-widest">Protocol Architecture Station</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setShowJson(true)} className="bg-emerald-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-500 transition-all shadow-lg italic">Gerar JSON Final</button>
                            {view === 'mapper' && <button onClick={() => setView('builder')} className="bg-slate-800 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase italic border border-white/10">Voltar à Tabela</button>}
                        </div>
                    </header>

                    {view === 'builder' && (
                        <main className="flex-1 flex overflow-hidden fade-in">
                            <aside className="w-80 border-r border-white/5 p-8 space-y-8 bg-black/20 shrink-0 overflow-y-auto italic custom-scroll leading-none">
                                <div className="space-y-6">
                                    <h4 className="text-[10px] font-black text-blue-400 uppercase tracking-widest italic border-b border-white/10 pb-2">Configurações do Projeto</h4>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-500 uppercase block mb-3">Nome da Missão</label>
                                        <input value={mission.title} onChange={e => setMission({...mission, title: e.target.value})} className="w-full bg-slate-800 border border-white/5 p-4 rounded-2xl text-xs outline-none focus:border-blue-500 font-bold italic" placeholder="Ex: After Start" />
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-500 uppercase block mb-3 italic">Imagem Principal</label>
                                        <input value={mission.img} onChange={e => setMission({...mission, img: e.target.value})} className="w-full bg-slate-800 border border-white/5 p-4 rounded-2xl text-[10px] outline-none focus:border-blue-500 font-mono italic opacity-70" placeholder="normal-cockpit" />
                                    </div>
                                    <div className="p-5 bg-blue-500/10 rounded-[2rem] border border-blue-500/20">
                                        <label className="text-[9px] font-black text-blue-400 uppercase block mb-3 tracking-widest italic">Papel (Role) Global</label>
                                        <select value={mission.defaultRole} onChange={e => setMission({...mission, defaultRole: e.target.value})} className="w-full bg-slate-900 border border-white/5 p-3 rounded-xl text-xs outline-none font-bold uppercase italic cursor-pointer">
                                            <option value="PF">Pilot Flying (PF)</option>
                                            <option value="PM">Pilot Monitoring (PM)</option>
                                            <option value="Comandante">Comandante (P1)</option>
                                            <option value="Copiloto">Copiloto (P2)</option>
                                            <option value="BOTH">Ambos (Both)</option>
                                        </select>
                                        <p className="text-[8px] text-blue-300/40 mt-3 leading-relaxed">Novas etapas adotarão este papel por padrão.</p>
                                    </div>
                                </div>
                                <button onClick={() => setView('mapper')} className="w-full bg-blue-600 py-5 rounded-[2.5rem] font-black uppercase text-xs tracking-widest hover:bg-blue-500 transition-all flex justify-center items-center gap-3 shadow-xl italic leading-none">
                                    <Icons.Map /> Iniciar Calibração
                                </button>
                            </aside>

                            <div className="flex-1 flex flex-col p-10 bg-black/40 overflow-hidden italic leading-none">
                                <div className="flex justify-between items-center mb-8 shrink-0">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-600 italic">Arquitetura de Fluxo</h3>
                                    <button onClick={addStep} className="bg-slate-800 px-8 py-3 rounded-2xl font-black uppercase text-[10px] hover:bg-blue-600 transition-all flex items-center gap-3 border border-white/10 italic"><Icons.Plus /> Etapa Final</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto pr-4 custom-scroll pb-32">
                                    {mission.items.map((it, idx) => (
                                        <React.Fragment key={it.id}>
                                            <div className="insert-line flex items-center justify-center">
                                                <button onClick={() => insertStepAt(idx)} className="bg-blue-600 text-white p-2 rounded-full hover:bg-blue-500 transform hover:scale-125 transition-all z-10 shadow-lg"><Icons.Plus /></button>
                                                <div className="absolute w-full h-px bg-white/5 top-1/2 -translate-y-1/2"></div>
                                            </div>

                                            <div className="bg-slate-900/40 rounded-[2.5rem] p-6 border border-white/5 hover:border-white/10 transition-all group mb-1">
                                                <div className="flex items-start gap-5">
                                                    <div className="flex flex-col gap-1 mt-2">
                                                        <button onClick={() => moveStep(idx, -1)} className={`p-2 rounded-xl hover:bg-slate-700 transition-colors ${idx === 0 ? 'opacity-10 cursor-not-allowed' : 'text-emerald-500'}`}><Icons.Up /></button>
                                                        <button onClick={() => moveStep(idx, 1)} className={`p-2 rounded-xl hover:bg-slate-700 transition-colors ${idx === mission.items.length - 1 ? 'opacity-10 cursor-not-allowed' : 'text-emerald-500'}`}><Icons.Down /></button>
                                                    </div>

                                                    <div className="flex-1 grid grid-cols-12 gap-5">
                                                        <div className="col-span-3 space-y-4">
                                                            <div className="space-y-1">
                                                                <label className="text-[7px] font-black text-slate-600 uppercase tracking-widest ml-2">Papel</label>
                                                                <select value={it.role} onChange={e => updateItem(idx, 'role', e.target.value)} className="w-full bg-slate-950 border border-white/5 p-3 rounded-2xl text-[10px] font-bold uppercase outline-none focus:border-blue-500 italic">
                                                                    <option value="PF">PF</option><option value="PM">PM</option>
                                                                    <option value="Comandante">P1</option><option value="Copiloto">P2</option>
                                                                    <option value="BOTH">Ambos</option>
                                                                </select>
                                                            </div>
                                                            <div className="space-y-1">
                                                                <label className="text-[7px] font-black text-slate-600 uppercase tracking-widest ml-2">Interação</label>
                                                                <select value={it.type} onChange={e => updateItem(idx, 'type', e.target.value)} className="w-full bg-slate-950 border border-emerald-500/20 p-3 rounded-2xl text-[10px] font-black uppercase italic">
                                                                    <option value="click">CLIQUE VISUAL</option>
                                                                    <option value="question">DECISÃO TÉCNICA</option>
                                                                </select>
                                                            </div>
                                                        </div>

                                                        <div className="col-span-4 space-y-4">
                                                            <div className="space-y-1">
                                                                <label className="text-[7px] font-black text-slate-600 uppercase tracking-widest ml-2">Instrumento</label>
                                                                <input value={it.label} onChange={e => updateItem(idx, 'label', e.target.value)} className="w-full bg-slate-950 border border-white/5 p-3 rounded-2xl text-[11px] font-black outline-none italic" placeholder="STARTER" />
                                                            </div>
                                                            <div className="space-y-1">
                                                                <label className="text-[7px] font-black text-slate-600 uppercase tracking-widest ml-2">Status</label>
                                                                <input value={it.status} onChange={e => updateItem(idx, 'status', e.target.value)} className="w-full bg-slate-950/40 border border-white/5 p-3 rounded-2xl text-[10px] italic outline-none opacity-60" placeholder="OFF / CHECK" />
                                                            </div>
                                                        </div>

                                                        <div className="col-span-4">
                                                            <label className="text-[7px] font-black text-blue-400 uppercase mb-1 flex items-center gap-2 tracking-widest ml-2"><Icons.Image /> Asset Específico</label>
                                                            <input value={it.specificImg} onChange={e => updateItem(idx, 'specificImg', e.target.value)} className="w-full bg-slate-950 border border-blue-500/20 p-4 rounded-2xl text-[10px] font-mono outline-none italic focus:bg-blue-900/10 transition-colors" placeholder="Nome da imagem" />
                                                        </div>

                                                        <div className="col-span-1 flex items-center justify-end">
                                                            <button onClick={() => setMission({...mission, items: mission.items.filter((_, i) => i !== idx)})} className="p-4 text-red-500/20 hover:text-red-500 transition-all hover:bg-red-900/10 rounded-2xl"><Icons.Trash /></button>
                                                        </div>
                                                    </div>
                                                </div>

                                                {it.type === 'question' && (
                                                    <div className="mt-8 ml-14 p-8 bg-[#001c3d]/20 rounded-[3rem] border border-blue-500/10 fade-in space-y-6">
                                                        <div className="flex items-center gap-3 mb-2 text-blue-300">
                                                            <Icons.Check />
                                                            <h5 className="text-[10px] font-black uppercase tracking-[0.3em] italic">Decision Maker Config</h5>
                                                        </div>
                                                        <div className="space-y-1">
                                                            <label className="text-[7px] font-black text-slate-500 uppercase tracking-widest ml-3">Pergunta</label>
                                                            <input value={it.prompt} onChange={e => updateItem(idx, 'prompt', e.target.value)} className="w-full bg-slate-900/80 border border-blue-500/20 p-4 rounded-2xl text-[11px] font-bold italic outline-none focus:border-blue-400" placeholder="Ex: Qual o procedimento após a ignição?" />
                                                        </div>
                                                        <div className="grid grid-cols-3 gap-4">
                                                            {[0, 1, 2].map(cIdx => (
                                                                <div key={cIdx} className={`p-4 rounded-[2rem] border transition-all ${it.correct === cIdx ? 'bg-emerald-500/10 border-emerald-500/40 correct-indicator' : 'bg-slate-950 border-white/5 opacity-60'}`}>
                                                                    <div className="flex items-center gap-3 mb-3">
                                                                        <button onClick={() => updateItem(idx, 'correct', cIdx)} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${it.correct === cIdx ? 'bg-emerald-500 border-emerald-500' : 'border-white/20'}`}>
                                                                            {it.correct === cIdx && <Icons.Check />}
                                                                        </button>
                                                                        <span className="text-[8px] font-black uppercase text-slate-500">RESPOSTA {cIdx + 1}</span>
                                                                    </div>
                                                                    <input value={it.choices[cIdx]} onChange={e => updateChoice(idx, cIdx, e.target.value)} className="w-full bg-transparent p-1 text-[10px] outline-none italic font-bold text-white" placeholder="..." />
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'mapper' && (
                        <main className="flex-1 flex overflow-hidden italic leading-none fade-in">
                            <aside className="w-80 border-r border-white/5 bg-slate-900/50 p-8 flex flex-col shrink-0 italic">
                                <div className="mb-10">
                                    <h2 className="text-xs font-black uppercase text-emerald-400 tracking-[0.3em] flex items-center gap-3 italic"><Icons.Map /> Mapping Suite</h2>
                                    <p className="text-[10px] text-slate-500 mt-3 font-bold leading-relaxed italic">Clica no painel para gravar o ponto do item atual.</p>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-3 space-y-3 custom-scroll leading-none">
                                    {mission.items.map((it, i) => (
                                        <div key={it.id} className={`p-6 rounded-[2rem] border transition-all duration-500 ${i === mappingStep ? 'bg-emerald-600 border-emerald-400 scale-[1.03] shadow-2xl z-10' : it.coords ? 'bg-emerald-500/5 border-emerald-500/20' : 'opacity-20'}`}>
                                            <div className="flex justify-between items-center">
                                                <p className="text-xs font-black uppercase italic leading-none">{it.label || 'Sem Nome'}</p>
                                                {it.coords && <div className="text-emerald-500 font-black text-[10px]">OK</div>}
                                            </div>
                                            <div className="flex items-center gap-2 mt-3 text-[8px] font-black text-slate-500 uppercase tracking-widest">
                                                <Icons.Image /> {it.specificImg || mission.img}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </aside>
                            <div className="flex-1 bg-black flex flex-col items-center justify-center p-12 relative leading-none">
                                <div className="absolute top-12 bg-emerald-500 text-black px-14 py-4 rounded-full font-black uppercase text-xs animate-pulse italic leading-none z-[100] shadow-[0_0_50px_#10b981]">Mapeando agora: {mission.items[mappingStep]?.label}</div>
                                <div ref={canvasRef} onClick={handleMapClick} className="relative cursor-crosshair shadow-[0_0_150px_rgba(0,0,0,1)] rounded-[4rem] overflow-hidden max-w-full max-h-full aspect-video border-[15px] border-[#0f172a] leading-none transition-all duration-1000">
                                    <img src={manualImg || `https://placehold.co/1280x720/111/333?text=UPLOAD+PANEL+IMAGE`} className="w-full h-full object-contain pointer-events-none opacity-90 leading-none transition-all duration-700" />
                                    {mission.items.map((it, idx) => it.coords && (it.specificImg === (mission.items[mappingStep]?.specificImg || '')) && (
                                        <div key={idx} className="absolute w-12 h-12 rounded-full border-4 border-emerald-500 bg-emerald-500/20 flex items-center justify-center transform -translate-x-1/2 -translate-y-1/2 shadow-[0_0_40px_#10b981]" style={{ left: `${it.coords.x}%`, top: `${it.coords.y}%` }}><span className="text-[14px] font-black text-white italic leading-none">{idx + 1}</span></div>
                                    ))}
                                </div>
                                <div className="mt-8 flex gap-5 italic">
                                    <input type="file" className="hidden" id="fup" onChange={e => { const r = new FileReader(); r.onload = ev => setManualImg(ev.target.result); r.readAsDataURL(e.target.files[0]); }} />
                                    <button onClick={() => document.getElementById('fup').click()} className="bg-slate-800 px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] italic leading-none hover:bg-blue-600 transition-all border border-white/10 shadow-2xl">Carregar Imagem Local</button>
                                </div>
                            </div>
                        </main>
                    )}

                    {showJson && (
                        <div className="fixed inset-0 z-[1000] bg-slate-950/98 backdrop-blur-3xl flex items-center justify-center p-12 fade-in leading-none italic">
                            <div className="bg-[#0f172a] border border-blue-500/30 p-16 rounded-[4rem] w-full max-w-5xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden leading-none border-b-[15px] border-blue-600/50">
                                <h2 className="text-4xl font-black italic uppercase text-white mb-4 tracking-tighter italic leading-none">Engineering JSON Export</h2>
                                <p className="text-[11px] text-slate-500 uppercase tracking-widest mb-10 leading-none">Copia este código e cola no chat para atualizarmos o simulador master.</p>
                                <textarea readOnly className="flex-1 bg-black p-10 rounded-[2.5rem] font-mono text-[11px] text-blue-400 outline-none border border-white/5 custom-scroll resize-none italic leading-relaxed" value={JSON.stringify(mission, null, 2)} />
                                <div className="mt-8 flex gap-5">
                                    <button onClick={() => setShowJson(false)} className="px-10 py-7 border border-white/10 rounded-[2.2rem] font-black uppercase text-xs hover:bg-white/5 transition-all italic leading-none">Editar</button>
                                    <button onClick={copyJson} className="flex-1 bg-emerald-600 py-7 rounded-[2.2rem] font-black uppercase text-xs tracking-widest hover:bg-emerald-500 shadow-xl shadow-emerald-900/40 italic leading-none">Copiar e Concluir</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
